spring:
  application:
    name: techlearn-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/techlearn}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate  # Use flyway for migrations
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: simple

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain

jwt:
  secret: ${JWT_SECRET:your-super-secret-key-minimum-256-bits-long-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}     # 24 hours
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

ai-service:
  url: ${AI_SERVICE_URL:http://localhost:8000}

cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:5173}
    - https://techlearn.yourdomain.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.techlearn: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN

---
# Test profile
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
